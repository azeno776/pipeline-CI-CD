name: CI/CD ML Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check for changes in training_data.csv
        id: check_changes
        run: |
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep 'training_data.csv'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Train model
        if: steps.check_changes.outputs.changed == 'true'
        run: python train_model.py

      - name: Upload model to Hugging Face
        if: steps.check_changes.outputs.changed == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi

          token = os.environ["HF_TOKEN"]
          repo_id = "azeno776/mon-modele"

          api = HfApi()

          # Upload des fichiers du modèle
          for filename in ["linear_model.pkl", "linear_model.txt"]:
              api.upload_file(
                  path_or_fileobj=filename,
                  path_in_repo=filename,
                  repo_id=repo_id,
                  token=token,
              )

              print(f"Uploaded {filename}")

          print(f"Model uploaded to https://huggingface.co/{repo_id}")
          EOF